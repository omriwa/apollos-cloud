  <rect x="325" y="255" width="120" height="50" rx="8" fill="url(#gw)"/>
  <text x="385" y="275" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" font-weight="600" fill="#fff">Validate</text>
  <text x="385" y="293" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">Schema Check</text>
  <path d="M445 280 L470 280" stroke="#d97706" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="470" y="255" width="120" height="50" rx="8" fill="url(#gw)"/>
  <text x="530" y="275" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" font-weight="600" fill="#fff">Route</text>
  <text x="530" y="293" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">Channel Select</text>
  <path d="M590 280 L615 280" stroke="#d97706" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="615" y="255" width="120" height="50" rx="8" fill="url(#gw)"/>
  <text x="675" y="275" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" font-weight="600" fill="#fff">Send</text>
  <text x="675" y="293" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">Dispatch Msg</text>
  <path d="M735 280 L760 280" stroke="#d97706" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="760" y="255" width="120" height="50" rx="8" fill="url(#gw)"/>
  <text x="820" y="275" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" font-weight="600" fill="#fff">Confirm</text>
  <text x="820" y="293" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">Retry / Log</text>
  <text x="630" y="350" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#d97706" font-weight="600">Automata-based state transitions with retry logic and dead-letter queues</text>
  <!-- Delivery Channels -->
  <rect x="305" y="395" width="150" height="55" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="380" y="418" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="600" fill="#059669">Twilio API</text>
  <text x="380" y="438" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">SMS / Voice</text>
  <rect x="475" y="395" width="150" height="55" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="550" y="418" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="600" fill="#059669">WhatsApp</text>
  <text x="550" y="438" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">Business API</text>
  <rect x="645" y="395" width="150" height="55" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="720" y="418" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="600" fill="#059669">SNS / SES</text>
  <text x="720" y="438" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">Email / Push</text>
  <rect x="815" y="395" width="150" height="55" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="890" y="418" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="600" fill="#059669">CloudWatch</text>
  <text x="890" y="438" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">Metrics / SLA</text>
  <!-- Impact -->
  <rect x="380" y="484" width="264" height="36" rx="18" fill="url(#gp)"/>
  <text x="512" y="507" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="12" font-weight="700" fill="#fff">50% LATENCY REDUCTION</text>
  <text x="512" y="540" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" fill="#7a8da0">Architecture by Omri Wallach • Apollo's Cloud EOOD</text>
</svg>