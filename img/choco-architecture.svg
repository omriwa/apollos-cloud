<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 559" fill="none">
  <defs>
    <linearGradient id="gp" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4a56c0"/><stop offset="1" stop-color="#0c8599"/></linearGradient>
    <linearGradient id="gw" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#d97706"/><stop offset="1" stop-color="#be185d"/></linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4a56c0"/></marker>
  </defs>
  <rect width="1024" height="559" fill="#f7f3ee"/>
  <text x="512" y="38" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="16" font-weight="700" fill="#4d5f72">CHOCO — AWS CDK &amp; STEP FUNCTIONS NOTIFICATION ENGINE</text>
  <!-- Trigger -->
  <rect x="40" y="170" width="170" height="220" rx="16" fill="rgba(30,42,58,0.04)" stroke="#1e2a3a" stroke-width="2"/>
  <text x="125" y="200" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="12" font-weight="700" fill="#1e2a3a">TRIGGER EVENTS</text>
  <rect x="58" y="220" width="134" height="38" rx="8" fill="#fff" stroke="#e5ddd3" stroke-width="1.5"/>
  <text x="125" y="244" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">Order Created</text>
  <rect x="58" y="268" width="134" height="38" rx="8" fill="#fff" stroke="#e5ddd3" stroke-width="1.5"/>
  <text x="125" y="292" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">Delivery Update</text>
  <rect x="58" y="316" width="134" height="38" rx="8" fill="#fff" stroke="#e5ddd3" stroke-width="1.5"/>
  <text x="125" y="340" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">System Alert</text>
  <!-- Arrow -->
  <path d="M210 280 L270 280" stroke="#1e2a3a" stroke-width="2" marker-end="url(#arr)"/>
  <!-- AWS Cloud -->
  <rect x="280" y="75" width="700" height="400" rx="22" fill="rgba(74,86,192,0.04)" stroke="#4a56c0" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="630" y="103" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="14" font-weight="700" fill="#4a56c0">AWS SERVERLESS — CDK MANAGED</text>
  <!-- API Gateway -->
  <rect x="305" y="125" width="200" height="55" rx="10" fill="url(#gp)"/>
  <text x="405" y="150" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="12" font-weight="700" fill="#fff">API Gateway</text>
  <text x="405" y="168" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">REST Endpoints</text>
  <!-- Validation Lambda -->
  <rect x="530" y="125" width="180" height="55" rx="10" fill="#fff" stroke="#4a56c0" stroke-width="2"/>
  <text x="620" y="150" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="600" fill="#4a56c0">Validation λ</text>
  <text x="620" y="168" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">Input Sanitization</text>
  <path d="M505 152 L530 152" stroke="#4a56c0" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Step Functions State Machine -->
  <rect x="305" y="210" width="650" height="155" rx="16" fill="rgba(217,119,6,0.05)" stroke="#d97706" stroke-width="2"/>
  <text x="630" y="238" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="13" font-weight="700" fill="#d97706">AWS STEP FUNCTIONS — STATE MACHINE</text>
