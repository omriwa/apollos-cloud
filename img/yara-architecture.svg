  <rect x="58" y="172" width="134" height="42" rx="8" fill="#fff" stroke="#e5ddd3" stroke-width="1.5"/>
  <text x="125" y="198" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">🏭 Europe Sensors</text>
  <rect x="58" y="226" width="134" height="42" rx="8" fill="#fff" stroke="#e5ddd3" stroke-width="1.5"/>
  <text x="125" y="252" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">🏭 Americas Sensors</text>
  <rect x="58" y="280" width="134" height="42" rx="8" fill="#fff" stroke="#e5ddd3" stroke-width="1.5"/>
  <text x="125" y="306" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">🏭 Asia-Pacific Sensors</text>
  <rect x="58" y="334" width="134" height="42" rx="8" fill="#fff" stroke="#e5ddd3" stroke-width="1.5"/>
