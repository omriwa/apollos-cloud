<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 559" fill="none">
  <defs>
    <linearGradient id="gp" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4a56c0"/><stop offset="1" stop-color="#0c8599"/></linearGradient>
    <linearGradient id="gw" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#d97706"/><stop offset="1" stop-color="#be185d"/></linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4a56c0"/></marker>
  </defs>
  <rect width="1024" height="559" fill="#f7f3ee"/>
  <text x="512" y="38" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="16" font-weight="700" fill="#4d5f72">YARA INTERNATIONAL — GLOBAL AWS IoT MONITORING PLATFORM</text>
  <!-- Factory Sensors -->
  <rect x="40" y="120" width="170" height="320" rx="16" fill="rgba(217,119,6,0.06)" stroke="#d97706" stroke-width="2"/>
