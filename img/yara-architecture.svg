  <text x="713" y="244" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="600" fill="#4a56c0">Scheduler λ</text>
  <text x="713" y="264" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">Cron Jobs</text>
  <rect x="805" y="215" width="145" height="70" rx="10" fill="#fff" stroke="#4a56c0" stroke-width="2"/>
  <text x="878" y="244" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="600" fill="#4a56c0">Auth Service</text>
  <text x="878" y="264" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">KMS / Secrets</text>
