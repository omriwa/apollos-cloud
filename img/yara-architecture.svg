  <rect x="310" y="410" width="640" height="45" rx="10" fill="rgba(5,150,105,0.06)" stroke="#059669" stroke-width="1.5"/>
  <text x="630" y="438" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="600" fill="#059669">CloudFormation • Docker • ECS • GitHub Actions CI/CD • TDD/BDD (Jest, Cypress)</text>
  <!-- Impact badge -->
  <rect x="380" y="484" width="264" height="36" rx="18" fill="url(#gw)"/>
  <text x="512" y="507" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="12" font-weight="700" fill="#fff">60% RELIABILITY IMPROVEMENT</text>
  <text x="512" y="540" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" fill="#7a8da0">Architecture by Omri Wallach • Apollo's Cloud EOOD</text>
