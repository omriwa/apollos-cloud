  <text x="410" y="342" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="12" font-weight="600" fill="#059669">DynamoDB</text>
  <text x="410" y="362" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">Single-Table Design</text>
  <rect x="530" y="315" width="200" height="65" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="630" y="342" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="12" font-weight="600" fill="#059669">MySQL</text>
  <text x="630" y="362" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">Relational Data</text>
  <rect x="750" y="315" width="200" height="65" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="850" y="342" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="12" font-weight="600" fill="#059669">CloudWatch</text>
  <text x="850" y="362" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#4d5f72">Metrics / Alarms</text>
