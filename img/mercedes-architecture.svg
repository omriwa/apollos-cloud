  <text x="706" y="206" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="8" fill="#7a8da0">Business Logic</text>

  <rect x="796" y="150" width="162" height="70" rx="10" fill="#fff" stroke="#be185d" stroke-width="2"/>
  <circle cx="814" cy="166" r="6" fill="#be185d"/>
  <text x="877" y="170" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="700" fill="#be185d">Session + Cache</text>
  <text x="877" y="188" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="9" fill="#4d5f72">Redis Cluster</text>
  <text x="877" y="206" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="8" fill="#7a8da0">State Management</text>

