  <rect x="635" y="300" width="340" height="52" rx="10" fill="url(#gSRE)"/>
  <text x="805" y="322" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="12" font-weight="700" fill="#fff">Observability Stack</text>
