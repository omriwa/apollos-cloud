  <rect x="275" y="438" width="700" height="32" rx="8" fill="rgba(0,120,212,0.06)" stroke="#0078d4" stroke-width="1"/>
  <text x="625" y="459" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" font-weight="600" fill="#0078d4">Azure AKS • Golang • Java Spring Boot • gRPC • Terraform • Datadog • OpsGenie • Redis • Helm</text>

  <!-- Footer -->
  <text x="512" y="500" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="700" fill="#059669">Sub-second voice latency • 99.9%+ uptime • Millions of connected vehicles</text>
  <text x="512" y="525" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="10" fill="#7a8da0">Architecture by Omri Wallach • Apollo's Cloud EOOD</text>
