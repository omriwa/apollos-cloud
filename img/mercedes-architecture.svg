  <text x="386" y="410" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="9" fill="#7a8da0">Declarative • Git-versioned</text>

  <rect x="514" y="368" width="222" height="56" rx="10" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
  <text x="625" y="392" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="600" fill="#d97706">Azure DevOps CI/CD</text>
  <text x="625" y="410" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="9" fill="#7a8da0">Helm deploys • Canary</text>

  <rect x="753" y="368" width="222" height="56" rx="10" fill="#fff" stroke="#059669" stroke-width="1.5"/>
  <text x="864" y="392" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="11" font-weight="600" fill="#059669">Quality Engineering</text>
  <text x="864" y="410" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="9" fill="#7a8da0">TDD/BDD • Golang Tests • Mockito</text>

