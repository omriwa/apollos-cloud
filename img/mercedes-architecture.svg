<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 559" fill="none">
  <defs>
    <linearGradient id="gAzure" x1="0" y1="0" x2="1" y2="0.6"><stop offset="0" stop-color="#0078d4"/><stop offset="1" stop-color="#00a4ef"/></linearGradient>
    <linearGradient id="gGo" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#00add8"/><stop offset="1" stop-color="#007d9c"/></linearGradient>
    <linearGradient id="gWarm" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#d97706"/><stop offset="1" stop-color="#be185d"/></linearGradient>
    <linearGradient id="gSRE" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#632ca6"/><stop offset="1" stop-color="#4a56c0"/></linearGradient>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L8,5 L0,9" fill="none" stroke="#0078d4" stroke-width="2"/></marker>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,1 L8,5 L0,9" fill="none" stroke="#1e2a3a" stroke-width="2"/></marker>
  </defs>
  <!-- Background -->
  <rect width="1024" height="559" rx="0" fill="#f7f3ee"/>
